services:
  proxmox-soc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxmox-soc
    env_file:
      - .env
    environment:
      SOC_DB_PATH: ${SOC_DB_PATH:-/data/soc_dashboard.sqlite3}
    ports:
      - "8501:8501"
    volumes:
      - ./data:/data
    restart: always
