services:
  proxmox-soc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxmox-soc
    env_file:
      - .env
    environment:
      SOC_DB_PATH: ${SOC_DB_PATH:-/data/soc_dashboard.sqlite3}
    ports:
      - "8501:8501"
    volumes:
      - ./data:/data
      - ./experiment_log.csv:/app/experiment_log.csv:ro
      - ./analysis_output:/app/analysis_output
      - ./ssh_keys:/ssh_keys:ro
    restart: always

  proxmox-collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxmox-collector
    command: ["python", "collector.py"]
    env_file:
      - .env
    environment:
      SOC_DB_PATH: ${SOC_DB_PATH:-/data/soc_dashboard.sqlite3}
    volumes:
      - ./data:/data
      - ./ssh_keys:/ssh_keys:ro
    restart: always

  soc-syslog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc-syslog
    command: ["python", "syslog_collector.py"]
    env_file:
      - .env
    environment:
      SOC_DB_PATH: ${SOC_DB_PATH:-/data/soc_dashboard.sqlite3}
    ports:
      - "5514:5514/tcp"
      - "5514:5514/udp"
    volumes:
      - ./data:/data
    restart: always
